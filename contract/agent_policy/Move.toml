# validate_action + DeepBook moveCalls + record_spend atomically, so DeepBook stays a
# TS-side concern. Only the Sui framework + stdlib are needed here.
Sui = { local = "C:/Users/OWNER/.move/https___github_com_MystenLabs_sui_git_framework__testnet/crates/sui-framework/packages/sui-framework" }

