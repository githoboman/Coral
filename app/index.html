<!doctype html>
<html lang="en">

<head>

  <!-- Canonical URL -->

  <!-- Structured Data -->
  <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Tovira",
      "url": "https://testnet.tovira.xyz",
      "logo": "https://testnet.tovira.xyz/assets/logo.png",

        "https://x.com/tovira_sui"
      ],
      "description": "From deep research to onchain execution - all in one place. A smarter way to handle crypto workflows on Sui blockchain."
    }
    </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tovira",
      "url": "https://testnet.tovira.xyz",
      "description": "From deep research to onchain execution - all in one place. A smarter way to handle crypto workflows on Sui blockchain.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://testnet.tovira.xyz/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Tovira",
      "image": "/og-preview.png",
      "description": "From deep research to onchain execution - all in one place. A smarter way to handle crypto workflows on Sui blockchain.",

        "@type": "Brand",
        "name": "Tovira"
      },
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/PreOrder",
