version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile          # uses your bulletproof prod Dockerfile
    image: tovira-api:latest
    container_name: tovira-api-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # No volume mounts → immutable, secure, exactly what’s in the image
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      gunicorn app.main:app
              --workers 4
              --worker-class uvicorn.workers.UvicornWorker
              --bind 0.0.0.0:8000
              --timeout 120
              --access-logfile -
              --error-logfile -
              --log-level info

networks:
  default:
    name: tovira-network