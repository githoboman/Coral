version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tovira-api:dev
    container_name: tovira-api-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app                      # hot reload works instantly
      - /app/.venv                  # avoid mounting virtualenv
    env_file:
      - .env
    command: >
      sh -c "uvicorn app.main:app
             --reload
             --host 0.0.0.0
             --port 8000
             --log-level debug"
    # Keep stdin open + pseudo-tty for Ctrl+C
    stdin_open: true
    tty: true

networks:
  default:
    name: tovira-dev-network